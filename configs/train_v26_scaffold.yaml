# ============================================================================
# V3-scaffold config: V3 dataset (leakage-free) + Bemis-Murcko scaffold split.
#
# This is the paper's PRIMARY evaluation protocol (Table 5.1a). Same 2,521
# molecules and same data-curation pipeline as V3-random (5 published NLRP3
# inhibitors + their Tanimoto >= 0.7 neighbours moved to external hold-out),
# but molecules are grouped by generic Bemis-Murcko scaffold before splitting
# so no scaffold appears in more than one of {train, val, test}. Expected
# 5-seed ROC-AUC ~0.9167 (headline result in the paper's Table 5.1a).
#
# Test set: N = 193, P = 54, active prevalence 27.98%.
# EF theoretical upper bound: N/P = 193/54 = 3.5741.
# ============================================================================
data:
  train_path: data/processed/nlrp3/train.csv
  val_path: data/processed/nlrp3/val.csv
  test_path: data/processed/nlrp3/test.csv

experiment:
  name: v26_v3_scaffold_5seeds
  random_seeds:
  - 42
  - 123
  - 2024
  - 3407
  - 7
  use_gpu: true

# ----- Multi-task learning (from Phase 1B) ----------------------------------
multitask:
  enabled: true
  admet_weight: 0.2

fusion:
  modes:
  - 1D+2D+3D

model:
  cutoff: 8.0
  dmpnn_layers: 3
  dropout: 0.54
  hidden_dim: 112
  num_radial: 6
  num_spherical: 7
  spherenet_dropout: 0.3
  spherenet_layers: 3

mol2vec:
  embedding_dim: 300
  model_path: data/mol2vec_model.pkl
  radius: 1

output:
  base_dir: results/v26_v3_scaffold
  save_figures: true
  save_models: true

training:
  batch_size: 128
  branch_lr_scale:
    classifier: 1.0
    encoder_1d: 0.25
    encoder_2d: 0.8
    encoder_3d: 0.8
    fusion: 1.5
  class_weight: balanced
  epochs: 300
  learning_rate: 0.0003
  loss:
    gamma: 1.5
    label_smoothing: 0.05
    lambda_diversity: 0.15
    max_pos_weight: 2.5
    type: focal
    use_class_weight: true
  patience: 100
  scheduler:
    anneal_strategy: cos
    div_factor: 10.0
    final_div_factor: 1000.0
    pct_start: 0.15
    type: OneCycleLR
  threshold_search:
    beta: 1.2
    min_recall: null
    search_high: 0.55
    search_low: 0.3
    search_step: 0.005
  weight_decay: 0.015

visualization:
  dpi: 300
  plot_confusion_matrix: true
  plot_learning_curve: true
  plot_modality_weights: true
  plot_pr: true
  plot_roc: true
